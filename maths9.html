<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 9 Maths | Knowledge Nexus Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #233a71;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-main); }

        /* Hero Header */
        .hero-section {
            background-color: var(--primary-blue);
            min-height: 200px;
            padding: 20px 5%;
            color: white;
        }

        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { 
            color: white; text-decoration: none; font-size: 0.9rem; 
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: -60px auto 50px;
            padding: 0 15px;
        }

        .page-title { margin-bottom: 25px; color: white; font-size: 2rem; font-weight: 800; }

        /* Chapter Card Styling */
        .chapter-card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .chapter-card:hover { transform: translateY(-3px); }

        .chapter-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .chapter-info p { font-size: 0.85rem; color: var(--text-muted); }

        /* Buttons Group */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .action-btn {
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            background: #f1f5f9;
            color: var(--text-main);
        }

        .action-btn i { font-size: 1rem; }
        
        /* Button Variants */
        .btn-notes:hover { background: #dbeafe; color: #1e40af; }
        .btn-qs:hover { background: #dcfce7; color: #166534; }
        .btn-mcq { background: var(--primary-blue); color: white; }
        .btn-mcq:hover { background: #1a2a52; }

        /* Responsive Settings */
        @media (max-width: 768px) {
            .chapter-card { flex-direction: column; align-items: flex-start; gap: 20px; }
            .btn-group { width: 100%; justify-content: space-between; }
            .action-btn { flex: 1; justify-content: center; font-size: 0.75rem; padding: 12px 8px; }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <nav>
        <div class="back-btn" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </div>
        <div id="studentName" style="font-size: 0.85rem; opacity: 0.9;">Loading...</div>
    </nav>
    <h1 class="page-title">Mathematics</h1>
</section>

<div class="container">
    
    <div class="chapter-card">
        <div class="chapter-info">
            <h3>Chapter 1: Number Systems</h3>
            <p>Real numbers, Laws of exponents</p>
        </div>
        <div class="btn-group">
            <button class="action-btn btn-notes" onclick="downloadNotes(1)"><i class="fas fa-file-pdf"></i> Notes</button>
            <button class="action-btn btn-qs" onclick="openQuestions(1)"><i class="fas fa-pen-to-square"></i> Questions</button>
            <button class="action-btn btn-mcq" onclick="openMCQ(1)"><i class="fas fa-stopwatch"></i> MCQ Test</button>
        </div>
    </div>

    <div class="chapter-card">
        <div class="chapter-info">
            <h3>Chapter 2: Polynomials</h3>
            <p>Factorisation, Algebraic identities</p>
        </div>
        <div class="btn-group">
            <button class="action-btn btn-notes" onclick="downloadNotes(2)"><i class="fas fa-file-pdf"></i> Notes</button>
            <button class="action-btn btn-qs" onclick="openQuestions(2)"><i class="fas fa-pen-to-square"></i> Questions</button>
            <button class="action-btn btn-mcq" onclick="openMCQ(2)"><i class="fas fa-stopwatch"></i> MCQ Test</button>
        </div>
    </div>

    <div class="chapter-card">
        <div class="chapter-info">
            <h3>Chapter 3: Coordinate Geometry</h3>
            <p>Cartesian system, Plotting points</p>
        </div>
        <div class="btn-group">
            <button class="action-btn btn-notes" onclick="downloadNotes(3)"><i class="fas fa-file-pdf"></i> Notes</button>
            <button class="action-btn btn-qs" onclick="openQuestions(3)"><i class="fas fa-pen-to-square"></i> Questions</button>
            <button class="action-btn btn-mcq" onclick="openMCQ(3)"><i class="fas fa-stopwatch"></i> MCQ Test</button>
        </div>
    </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
        authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
        projectId: "knowledgenexusacademy-7c1b3",
        storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docRef = doc(db, "students", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                document.getElementById("studentName").innerText = "Welcome, " + docSnap.data().name;
            }
        } else {
            window.location.href = "index.html";
        }
    });
</script>

<script>
    function goBack() { window.location.href = "class9index.html"; }
    function downloadNotes(id) { alert("Downloading Notes for Chapter " + id); }
    function openQuestions(id) { alert("Opening Practice Questions for Chapter " + id); }
    function openMCQ(id) { alert("Starting MCQ Test for Chapter " + id); }
</script>

</body>
</html>
