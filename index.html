<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Nexus Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--accent:#00f5a0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
color:white;
}

.container{
width:95%;
max-width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
font-weight:800;
font-size:22px;
margin-bottom:25px;
color:var(--accent);
}

.form{
display:flex;
flex-direction:column;
gap:15px;
}

input, select{
padding:14px;
border-radius:12px;
border:none;
outline:none;
font-size:14px;
}

button{
padding:14px;
border:none;
border-radius:30px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:10px;
font-size:14px;
}

.switch span{
color:var(--accent);
cursor:pointer;
font-weight:600;
}

#error{
text-align:center;
color:#ff4d4d;
font-size:13px;
min-height:20px;
}

#signupForm{
display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Knowledge Nexus Academy</div>

<div id="error"></div>

<!-- LOGIN -->
<form id="loginForm" class="form">

<input type="email" id="loginEmail" placeholder="Email Address" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button type="submit">Login</button>

<div class="switch">
Don't have an account?
<span onclick="showSignup()">Sign Up</span>
</div>

</form>


<!-- SIGNUP -->
<form id="signupForm" class="form">

<input type="text" id="signupName" placeholder="Full Name" required>

<input type="email" id="signupEmail" placeholder="Email Address" required>

<select id="signupClass" required>

<option value="">Select Class</option>
<option value="5">Class 5</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="10">Class 10</option>

</select>

<input type="password" id="signupPassword" placeholder="Create Password" required>

<button type="submit">Create Account</button>

<div class="switch">
Already have an account?
<span onclick="showLogin()">Login</span>
</div>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",

authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",

projectId: "knowledgenexusacademy-7c1b3",

storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const errorBox = document.getElementById("error");



/* ================= SIGNUP ================= */

document.getElementById("signupForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const name = document.getElementById("signupName").value.trim();

const email = document.getElementById("signupEmail").value.trim();

const studentClass = document.getElementById("signupClass").value;

const password = document.getElementById("signupPassword").value;

if(!studentClass){

errorBox.innerText="Please select class.";

return;

}

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

const user = userCredential.user;


/* SAVE STUDENT DATA */

await setDoc(doc(db,"students",user.uid),{

name:name,

email:email,

class:studentClass,

role:"student",

createdAt:serverTimestamp()

});


alert("Account Created Successfully!");

window.location.href="class"+studentClass+"index.html";

}catch(error){

errorBox.innerText=error.message;

}

});



/* ================= LOGIN ================= */

document.getElementById("loginForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const email=document.getElementById("loginEmail").value;

const password=document.getElementById("loginPassword").value;

try{

const userCredential=await signInWithEmailAndPassword(auth,email,password);

const user=userCredential.user;


/* CHECK STUDENT */

const studentRef=doc(db,"students",user.uid);

const studentSnap=await getDoc(studentRef);


if(studentSnap.exists()){

const studentClass=studentSnap.data().class;

window.location.href="class"+studentClass+"index.html";

return;

}


/* CHECK TEACHER */

const teacherRef=doc(db,"teachers",user.uid);

const teacherSnap=await getDoc(teacherRef);

if(teacherSnap.exists()){

window.location.href="teacher-dashboard.html";

return;

}

errorBox.innerText="User data not found.";

}catch(error){

errorBox.innerText=error.message;

}

});

</script>


<script>

function showSignup(){

document.getElementById("loginForm").style.display="none";

document.getElementById("signupForm").style.display="flex";

document.getElementById("error").innerText="";

}

function showLogin(){

document.getElementById("signupForm").style.display="none";

document.getElementById("loginForm").style.display="flex";

document.getElementById("error").innerText="";

}

</script>

</body>
</html>
