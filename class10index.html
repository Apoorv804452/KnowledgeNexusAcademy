<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 10 Dashboard | Knowledge Nexus Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--accent:#00f5a0;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111827;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.logo{
font-weight:800;
font-size:20px;
color:var(--accent);
}

.student-info{
font-size:14px;
}

.logout-btn{
padding:8px 18px;
border:none;
border-radius:20px;
background:var(--accent);
font-weight:600;
cursor:pointer;
}

.container{
padding:40px;
}

.title{
font-size:26px;
font-weight:700;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:13px;
opacity:0.8;
}
</style>
</head>
<body>

<header>
<div class="logo">Knowledge Nexus Academy</div>
<div>
<span class="student-info" id="studentName">Loading...</span>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>
</header>

<div class="container">
<div class="title">Class 10 Dashboard</div>

<div class="grid">

<div class="card">
<h3>Mathematics</h3>
<p>Chapter Notes, PYQs, Practice Questions</p>
</div>

<div class="card">
<h3>Science</h3>
<p>Physics, Chemistry & Biology Notes</p>
</div>

<div class="card">
<h3>Social Science</h3>
<p>History, Geography, Civics, Economics</p>
</div>

<div class="card">
<h3>English</h3>
<p>Literature, Grammar & Writing Skills</p>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
  authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
  projectId: "knowledgenexusacademy-7c1b3",
  storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const studentName = document.getElementById("studentName");

/* 🔐 Protect Page */
onAuthStateChanged(auth, async (user)=>{
if(user){

const docRef = doc(db,"students",user.uid);
const docSnap = await getDoc(docRef);

if(docSnap.exists()){
const data = docSnap.data();

if(data.class !== "10"){
alert("Access Denied!");
window.location.href="login.html";
return;
}

studentName.innerText = "Welcome, " + data.name;
}

}else{
window.location.href="login.html";
}
});

/* Logout */
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
await signOut(auth);
window.location.href="login.html";
});

</script>

</body>
</html>
