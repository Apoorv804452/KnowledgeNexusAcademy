<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 9 Dashboard | Knowledge Nexus Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #233a71;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--light-bg); color: var(--text-main); }

        .hero-section {
            background-color: var(--primary-blue);
            height: 280px;
            padding: 20px 50px;
            color: white;
        }

        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .user-nav { display: flex; align-items: center; gap: 15px; }

        /* Dynamic Initials Circle */
        .avatar {
            background: #4ade80;
            color: #064e3b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .logout-btn {
            background: #ef4444; color: white; border: none; 
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }

        .main-content {
            max-width: 1200px;
            margin: -80px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
        }

        .card { background: var(--white); border-radius: 24px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }

        /* Subject Grid */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .subject-card {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .subject-card:hover { border-color: #3b82f6; background: #fff; transform: translateY(-3px); }
        .subject-card i { font-size: 1.5rem; margin-bottom: 10px; color: #233a71; }
        .subject-card p { font-weight: 600; font-size: 0.9rem; }

        /* Item Rows */
        .item {
            display: flex; align-items: center; padding: 12px;
            border: 1px solid #f1f5f9; border-radius: 12px;
            margin-bottom: 10px; text-decoration: none; color: inherit;
        }

        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; color: white; }
        .blue { background: #3b82f6; } .orange { background: #f59e0b; } .green { background: #10b981; }

    </style>
</head>
<body>

<section class="hero-section">
    <nav>
        <div class="logo"><strong>Knowledge Nexus Academy</strong></div>
        <div class="user-nav">
            <span id="userName">Student</span>
            <div class="avatar" id="userInitials">??</div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>
    <h1>Class 9 Dashboard</h1>
    <p id="welcomeMsg">Welcome back!</p>
</section>

<main class="main-content">
    <div class="left-col">
        <div class="card">
            <div class="card-title"><i class="fas fa-book"></i> My Subjects</div>
            <div class="subject-grid">
                <div class="subject-card" onclick="window.location.href='maths9.html'">
                    <i class="fas fa-calculator"></i>
                    <p>Maths</p>
                </div>
                <div class="subject-card" onclick="window.location.href='science9.html'">
                    <i class="fas fa-flask"></i>
                    <p>Science</p>
                </div>
                <div class="subject-card" onclick="window.location.href='history9.html'">
                    <i class="fas fa-landmark"></i>
                    <p>History</p>
                </div>
                <div class="subject-card" onclick="window.location.href='english9.html'">
                    <i class="fas fa-pen-nib"></i>
                    <p>English</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-folder" style="color:#3b82f6"></i> Recent Notes</div>
            <a href="#" class="item">
                <div class="icon-box blue"><i class="fas fa-file-pdf"></i></div>
                <h4>Chemistry Chapter 6.pdf</h4>
            </a>
        </div>
    </div>

    <div class="right-col">
        <div class="card">
            <div class="card-title"><i class="fas fa-clipboard-list" style="color:#f59e0b"></i> Homework</div>
            <div class="item">
                <div class="icon-box orange"><i class="fas fa-tasks"></i></div>
                <div>
                    <h4>Maths Exercise 8.2</h4>
                    <p style="font-size:0.8rem; color:gray">Due April 25</p>
                </div>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
        authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
        projectId: "knowledgenexusacademy-7c1b3",
        storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docRef = doc(db, "students", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                const name = data.name;
                
                // Set Display Name
                document.getElementById("userName").innerText = name;
                document.getElementById("welcomeMsg").innerText = "Welcome back, " + name + "!";

                // Generate Initials (e.g., "Siddharth" -> "S", "Rahul Sharma" -> "RS")
                const initials = name.split(" ").map(n => n[0]).join("");
                document.getElementById("userInitials").innerText = initials.substring(0, 2);
            }
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));
</script>
</body>
</html>
