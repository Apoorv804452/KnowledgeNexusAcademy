<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 9 Dashboard | Knowledge Nexus Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #233a71;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Fixed Header Area */
        .hero-section {
            background-color: var(--primary-blue);
            height: 280px; /* Gives enough room so text doesn't overlap */
            padding: 20px 50px;
            color: white;
            position: relative;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            background: #4ade80;
            color: #064e3b;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover { background: #dc2626; }

        /* Welcome Text */
        .welcome-box {
            position: relative;
            z-index: 1;
        }

        .welcome-box h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        /* Dashboard Content - The "Lifting" effect */
        .main-content {
            max-width: 1200px;
            margin: -80px auto 50px; /* Pulls content up into the blue area */
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr; /* Matches the image layout */
            gap: 25px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
        }

        /* List Items */
        .item {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 1px solid #f1f5f9;
            border-radius: 16px;
            margin-bottom: 15px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .item:hover {
            transform: scale(1.02);
            background: #fbfcfd;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            color: white;
            font-size: 1.2rem;
        }

        .blue-icon { background: #3b82f6; }
        .green-icon { background: #10b981; }
        .orange-icon { background: #f59e0b; }

        .item-text h4 { font-size: 1.1rem; margin-bottom: 2px; }
        .item-text p { font-size: 0.9rem; color: var(--text-muted); }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; margin-top: -40px; }
            .hero-section { height: auto; padding-bottom: 80px; }
        }
    </style>
</head>
<body>

<section class="hero-section">
    <nav>
        <div class="logo">
            <i class="fas fa-book-open"></i> Knowledge Nexus Academy
        </div>
        <div class="user-nav">
            <span id="displayName">Siddharth</span>
            <div class="avatar">RA</div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="welcome-box">
        <h1>Class 9 Dashboard</h1>
        <p id="welcomeUser">Welcome back, Rahul!</p>
    </div>
</section>

<main class="main-content">
    <div class="card">
        <div class="card-title">
            <i class="fas fa-folder" style="color: #3b82f6;"></i> Notes
        </div>
        
        <a href="#" class="item">
            <div class="icon-box blue-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="item-text">
                <h4>Chemistry Chapter 6.pdf</h4>
            </div>
        </a>

        <a href="#" class="item">
            <div class="icon-box green-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="item-text">
                <h4>Physics Chapter 4.pdf</h4>
            </div>
        </a>
    </div>

    <div class="card">
        <div class="card-title">
            <i class="fas fa-clipboard-list" style="color: #f59e0b;"></i> Homework
        </div>

        <div class="item">
            <div class="icon-box orange-icon"><i class="fas fa-calculator"></i></div>
            <div class="item-text">
                <h4>Maths Exercise 8.2</h4>
                <p>Due April 25</p>
            </div>
        </div>

        <div class="item">
            <div class="icon-box green-icon"><i class="fas fa-landmark"></i></div>
            <div class="item-text">
                <h4>History Questions</h4>
                <p>Due Today</p>
            </div>
        </div>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
        authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
        projectId: "knowledgenexusacademy-7c1b3",
        storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const docRef = doc(db, "students", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("displayName").innerText = data.name;
                document.getElementById("welcomeUser").innerText = "Welcome back, " + data.name + "!";
            }
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
        signOut(auth).then(() => {
            window.location.href = "index.html";
        });
    });
</script>

</body>
</html>
