<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Class 9 Mathematics</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.chapter{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.buttons{
margin-top:10px;
}

button{
margin-right:10px;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:white;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>

<body>

<header>
Class 9 – Mathematics
</header>

<div class="container" id="chapters">

Loading chapters...

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
projectId: "knowledgenexusacademy-7c1b3",
storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


async function loadNotes(){

const q = query(
collection(db,"notes"),
where("class","==","9"),
where("subject","==","maths")
);

const querySnapshot = await getDocs(q);

const container=document.getElementById("chapters");

container.innerHTML="";

querySnapshot.forEach((doc)=>{

const data=doc.data();

container.innerHTML+=`

<div class="chapter">

<h3>${data.chapter}</h3>

<div class="buttons">

<button onclick="window.open('${data.url}')">
Download Notes
</button>

<button onclick="alert('MCQ Test Coming Soon')">
MCQ Test
</button>

<button onclick="alert('Additional Questions Coming Soon')">
Additional Questions
</button>

</div>

</div>

`;

});

}

loadNotes();

</script>

</body>
</html>
