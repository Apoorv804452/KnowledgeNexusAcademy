<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Dashboard | Knowledge Nexus Academy</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#0f172a;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

h2{
margin-top:0;
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

.success{
color:green;
margin-top:10px;
}

</style>
</head>

<body>

<header>
Teacher Dashboard – Knowledge Nexus Academy
</header>

<div class="container">

<div class="card">

<h2>Upload Study Material</h2>

<select id="class">
<option value="">Select Class</option>
<option value="5">Class 5</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="10">Class 10</option>
</select>

<select id="subject">
<option value="">Select Subject</option>
<option value="maths">Mathematics</option>
<option value="science">Science</option>
<option value="english">English</option>
<option value="sst">Social Science</option>
</select>

<input type="text" id="chapter" placeholder="Enter Chapter Name">

<h3>Upload Notes PDF</h3>
<input type="file" id="notesFile">

<button onclick="uploadNotes()">Upload Notes</button>

<p class="success" id="notesMsg"></p>

<hr>

<h3>Upload Chapter Video</h3>
<input type="text" id="videoLink" placeholder="Paste YouTube Video Link">

<button onclick="uploadVideo()">Upload Video</button>

<p class="success" id="videoMsg"></p>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
projectId: "knowledgenexusacademy-7c1b3",
storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
const storage = getStorage(app);


async function uploadNotes(){

const classNo=document.getElementById("class").value;
const subject=document.getElementById("subject").value;
const chapter=document.getElementById("chapter").value;
const file=document.getElementById("notesFile").files[0];

if(!classNo || !subject || !chapter || !file){
alert("Fill all fields");
return;
}

const storageRef=ref(storage,"notes/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

await addDoc(collection(db,"notes"),{
class:classNo,
subject:subject,
chapter:chapter,
url:url
});

document.getElementById("notesMsg").innerText="Notes Uploaded Successfully";

}

async function uploadVideo(){

const classNo=document.getElementById("class").value;
const subject=document.getElementById("subject").value;
const chapter=document.getElementById("chapter").value;
const video=document.getElementById("videoLink").value;

if(!classNo || !subject || !chapter || !video){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"videos"),{
class:classNo,
subject:subject,
chapter:chapter,
link:video
});

document.getElementById("videoMsg").innerText="Video Uploaded Successfully";

}

</script>

</body>
</html>
