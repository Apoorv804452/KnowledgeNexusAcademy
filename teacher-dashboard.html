<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f6fb;
margin:0;
}

.header{
background:#2b6cff;
color:white;
padding:20px;
font-size:22px;
font-weight:600;
}

.container{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#2b6cff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>

</head>
<body>

<div class="header">
Teacher Dashboard
</div>

<div class="container">

<!-- Upload Notes -->

<div class="card">

<h3>Upload Notes</h3>

<input type="text" id="notesSubject" placeholder="Subject">

<input type="file" id="notesFile">

<button onclick="uploadNotes()">Upload Notes</button>

</div>

<!-- Upload MCQ -->

<div class="card">

<h3>Upload MCQ</h3>

<input type="text" id="mcqSubject" placeholder="Subject">

<input type="text" id="mcqQuestion" placeholder="Question">

<input type="text" id="mcqA" placeholder="Option A">

<input type="text" id="mcqB" placeholder="Option B">

<input type="text" id="mcqC" placeholder="Option C">

<input type="text" id="mcqD" placeholder="Option D">

<input type="text" id="mcqAnswer" placeholder="Correct Answer">

<button onclick="uploadMCQ()">Upload MCQ</button>

</div>

<!-- Upload Video -->

<div class="card">

<h3>Upload Video</h3>

<input type="text" id="videoSubject" placeholder="Subject">

<input type="text" id="videoLink" placeholder="YouTube Link">

<button onclick="uploadVideo()">Upload Video</button>

</div>

<!-- Today's Classes -->

<div class="card">

<h3>Update Today's Classes</h3>

<input type="text" id="period1" placeholder="Period 1 Subject (40 min)">

<input type="text" id="period2" placeholder="Period 2 Subject (40 min)">

<button onclick="updateClasses()">Update Classes</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, doc, setDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);


// Upload Notes

window.uploadNotes = async function(){

const subject=document.getElementById("notesSubject").value;

const file=document.getElementById("notesFile").files[0];

const storageRef=ref(storage,"notes/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

await addDoc(collection(db,"notes"),{

subject:subject,

file:url

});

alert("Notes Uploaded");

}


// Upload MCQ

window.uploadMCQ = async function(){

await addDoc(collection(db,"mcq"),{

subject:document.getElementById("mcqSubject").value,

question:document.getElementById("mcqQuestion").value,

A:document.getElementById("mcqA").value,

B:document.getElementById("mcqB").value,

C:document.getElementById("mcqC").value,

D:document.getElementById("mcqD").value,

answer:document.getElementById("mcqAnswer").value

});

alert("MCQ Uploaded");

}


// Upload Video

window.uploadVideo = async function(){

await addDoc(collection(db,"videos"),{

subject:document.getElementById("videoSubject").value,

link:document.getElementById("videoLink").value

});

alert("Video Uploaded");

}


// Update Today Classes

window.updateClasses = async function(){

await setDoc(doc(db,"todayClasses","schedule"),{

period1:document.getElementById("period1").value,

period2:document.getElementById("period2").value

});

alert("Today's Classes Updated");

}

</script>

</body>
</html>
