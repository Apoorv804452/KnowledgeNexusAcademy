<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Knowledge Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; }
        .dashboard { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #233a71; color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .tab.active { background: #233a71; color: white; border-color: #233a71; }
        .panel { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); display: none; }
        .panel.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .row > * { flex: 1; }
        .btn { background: #233a71; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: #f1f5f9; color: #1e293b; }
        .list-item { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-left: 10px; }
        .edit { color: #2563eb; } .delete { color: #dc2626; }
        #logoutBtn { background: transparent; border: 1px solid white; color: white; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        #loginBox { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; }
        .attendance-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 10px; }
        .student-check { background: #f1f5f9; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        #teacherName { font-weight: 700; }
    </style>
</head>
<body>
    <!-- Login container (hidden initially, but if you use separate login page, you can remove this) -->
    <div id="loginBox" style="display: none;">
        <h2>Teacher Login</h2>
        <input type="email" id="email" placeholder="Email" /><br/><br/>
        <input type="password" id="password" placeholder="Password" /><br/><br/>
        <button class="btn" id="loginBtn">Login</button>
    </div>

    <div id="dashboardMain" style="display: none;">
        <div class="dashboard">
            <div class="header">
                <h1>
                    <i class="fas fa-chalkboard-teacher"></i> 
                    <span id="teacherName">Loading...</span> Sir
                </h1>
                <button id="logoutBtn">Logout</button>
            </div>
            <div class="tabs">
                <div class="tab active" data-tab="notes">📓 Notes</div>
                <div class="tab" data-tab="questions">❓ Questions</div>
                <div class="tab" data-tab="mcqs">📝 MCQs</div>
                <div class="tab" data-tab="students">👥 Students</div>
                <div class="tab" data-tab="attendance">📆 Attendance</div>
            </div>

            <!-- Notes Panel -->
            <div id="notesPanel" class="panel active">
                <h2>Upload Notes</h2>
                <div class="row">
                    <select id="noteSubject">
                        <option value="">Select Subject</option>
                        <option value="Science">Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Social Studies">Social Studies</option>
                        <option value="English">English</option>
                    </select>
                    <select id="noteClass">
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                    <select id="noteChapter">
                        <option value="">Select Chapter</option>
                    </select>
                </div>
                <input type="text" id="noteTitle" placeholder="Title / Description" />
                <input type="file" id="noteFile" accept=".pdf,.jpg,.png,.docx" />
                <button class="btn" id="uploadNoteBtn">Upload Note</button>
                <hr />
                <h3>Existing Notes</h3>
                <div id="notesList"></div>
            </div>

            <!-- Questions Panel (Practice) -->
            <div id="questionsPanel" class="panel">
                <h2>Practice Questions</h2>
                <div class="row">
                    <select id="qSubject">
                        <option value="">Select Subject</option>
                        <option value="Science">Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Social Studies">Social Studies</option>
                        <option value="English">English</option>
                    </select>
                    <select id="qClass">
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                    <select id="qChapter">
                        <option value="">Select Chapter</option>
                    </select>
                </div>
                <textarea id="qQuestion" placeholder="Question text" rows="2"></textarea>
                <div class="row">
                    <input type="text" id="qOpt0" placeholder="Option 1" />
                    <input type="text" id="qOpt1" placeholder="Option 2" />
                </div>
                <div class="row">
                    <input type="text" id="qOpt2" placeholder="Option 3" />
                    <input type="text" id="qOpt3" placeholder="Option 4" />
                </div>
                <input type="number" id="qCorrect" placeholder="Correct option (0-3)" min="0" max="3" />
                <input type="file" id="qImage" accept="image/*" />
                <button class="btn" id="saveQuestionBtn">Save Question</button>
                <hr />
                <div id="questionsList"></div>
            </div>

            <!-- MCQs Panel -->
            <div id="mcqsPanel" class="panel">
                <h2>MCQ Questions (for tests)</h2>
                <div class="row">
                    <select id="mcqSubject">
                        <option value="">Select Subject</option>
                        <option value="Science">Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Social Studies">Social Studies</option>
                        <option value="English">English</option>
                    </select>
                    <select id="mcqClass">
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                    <select id="mcqChapter">
                        <option value="">Select Chapter</option>
                    </select>
                </div>
                <textarea id="mcqQuestion" placeholder="MCQ text" rows="2"></textarea>
                <div class="row">
                    <input type="text" id="mcqOpt0" placeholder="Option 1" />
                    <input type="text" id="mcqOpt1" placeholder="Option 2" />
                </div>
                <div class="row">
                    <input type="text" id="mcqOpt2" placeholder="Option 3" />
                    <input type="text" id="mcqOpt3" placeholder="Option 4" />
                </div>
                <input type="number" id="mcqCorrect" placeholder="Correct option (0-3)" />
                <input type="file" id="mcqImage" accept="image/*" />
                <button class="btn" id="saveMcqBtn">Save MCQ</button>
                <hr />
                <div id="mcqsList"></div>
            </div>

            <!-- Students Panel -->
            <div id="studentsPanel" class="panel">
                <h2>Add Student</h2>
                <div class="row">
                    <input type="text" id="studentName" placeholder="Full Name" />
                    <input type="email" id="studentEmail" placeholder="Email" />
                </div>
                <div class="row">
                    <select id="studentClass">
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                    <input type="text" id="studentRoll" placeholder="Roll Number" />
                </div>
                <button class="btn" id="addStudentBtn">Add Student</button>
                <hr />
                <h3>Student List</h3>
                <div id="studentsList"></div>
            </div>

            <!-- Attendance Panel -->
            <div id="attendancePanel" class="panel">
                <h2>Take Attendance</h2>
                <div class="row">
                    <input type="date" id="attDate" />
                    <select id="attSubject">
                        <option value="">Subject</option>
                        <option value="Science">Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Social Studies">Social Studies</option>
                        <option value="English">English</option>
                    </select>
                    <select id="attClass">
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <button class="btn" id="loadStudentsForAttendance">Load Students</button>
                <div id="attendanceStudentsContainer" style="margin-top:20px;"></div>
                <button class="btn" id="saveAttendanceBtn" style="display:none;">Save Attendance</button>
                <hr />
                <h3>Previous Attendance</h3>
                <div id="attendanceRecords"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfFH9BvfDz5E1hytPAb37hJVMkYpGtMWs",
            authDomain: "knowledgenexusacademy-7c1b3.firebaseapp.com",
            projectId: "knowledgenexusacademy-7c1b3",
            storageBucket: "knowledgenexusacademy-7c1b3.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // DOM elements
        const loginBox = document.getElementById('loginBox');
        const dashboardMain = document.getElementById('dashboardMain');
        const emailInp = document.getElementById('email');
        const passInp = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');
        const teacherNameSpan = document.getElementById('teacherName');

        // Chapter mapping for Class 9 (extend as needed)
        const chaptersBySubject = {
            "Science": [
                "Matter in Our Surroundings",
                "Is Matter Around Us Pure",
                "Atoms and Molecules",
                "Structure of the Atom",
                "The Fundamental Unit of Life",
                "Tissues",
                "Diversity in Living Organisms",
                "Motion",
                "Force and Laws of Motion",
                "Gravitation",
                "Work and Energy",
                "Sound",
                "Why Do We Fall Ill",
                "Natural Resources",
                "Improvement in Food Resources"
            ],
            "Mathematics": [
                "Number Systems",
                "Polynomials",
                "Coordinate Geometry",
                "Linear Equations in Two Variables",
                "Introduction to Euclid's Geometry",
                "Lines and Angles",
                "Triangles",
                "Quadrilaterals",
                "Areas of Parallelograms and Triangles",
                "Circles",
                "Constructions",
                "Heron's Formula",
                "Surface Areas and Volumes",
                "Statistics",
                "Probability"
            ],
            "Social Studies": [
                "The French Revolution",
                "Socialism in Europe and the Russian Revolution",
                "Nazism and the Rise of Hitler",
                "Forest Society and Colonialism",
                "Pastoralists in the Modern World",
                "India – Size and Location",
                "Physical Features of India",
                "Drainage",
                "Climate",
                "Natural Vegetation and Wildlife",
                "Population",
                "What is Democracy? Why Democracy?",
                "Constitutional Design",
                "Electoral Politics",
                "Working of Institutions",
                "Democratic Rights",
                "The Story of Village Palampur",
                "People as Resource",
                "Poverty as a Challenge",
                "Food Security in India"
            ],
            "English": [
                "The Fun They Had",
                "The Sound of Music",
                "The Little Girl",
                "A Truly Beautiful Mind",
                "The Snake and the Mirror",
                "My Childhood",
                "Packling",
                "Reach for the Top",
                "The Bond of Love",
                "Kathmandu",
                "If I Were You",
                "The Road Not Taken",
                "Wind",
                "Rain on the Roof",
                "The Lake Isle of Innisfree",
                "A Legend of the Northland",
                "No Men Are Foreign",
                "The Duck and the Kangaroo",
                "On Killing a Tree",
                "The Snake Trying",
                "The Lost Child",
                "The Adventures of Toto",
                "Iswaran the Storyteller",
                "In the Kingdom of Fools",
                "The Happy Prince",
                "Weathering the Storm in Ersama",
                "The Last Leaf",
                "A House Is Not a Home",
                "The Beggar"
            ]
        };

        // Function to populate chapter dropdown based on selected subject
        function updateChapterDropdown(subjectSelect, chapterSelect) {
            const subject = subjectSelect.value;
            const chapterDropdown = chapterSelect;
            // Clear existing options
            chapterDropdown.innerHTML = '<option value="">Select Chapter</option>';
            if (subject && chaptersBySubject[subject]) {
                chaptersBySubject[subject].forEach(ch => {
                    const option = document.createElement('option');
                    option.value = ch;
                    option.textContent = ch;
                    chapterDropdown.appendChild(option);
                });
            }
        }

        // Attach event listeners to subject dropdowns
        document.getElementById('noteSubject').addEventListener('change', function() {
            updateChapterDropdown(this, document.getElementById('noteChapter'));
        });
        document.getElementById('qSubject').addEventListener('change', function() {
            updateChapterDropdown(this, document.getElementById('qChapter'));
        });
        document.getElementById('mcqSubject').addEventListener('change', function() {
            updateChapterDropdown(this, document.getElementById('mcqChapter'));
        });

        // Auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBox.style.display = 'none';
                dashboardMain.style.display = 'block';
                loadTeacherName(user.uid);
                loadAllData();
            } else {
                loginBox.style.display = 'block';
                dashboardMain.style.display = 'none';
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithEmailAndPassword(auth, emailInp.value, passInp.value)
                .catch(err => alert('Login failed: ' + err.message));
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        async function loadTeacherName(uid) {
            try {
                const docRef = doc(db, 'teachers', uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    teacherNameSpan.innerText = data.name || 'Teacher';
                } else {
                    teacherNameSpan.innerText = 'Teacher';
                }
            } catch (e) {
                console.error('Error loading teacher name:', e);
                teacherNameSpan.innerText = 'Teacher';
            }
        }

        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                panels.forEach(p => p.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
                loadAllData();
            });
        });

        // ========== NOTES ==========
        document.getElementById('uploadNoteBtn').addEventListener('click', async () => {
            const subject = document.getElementById('noteSubject').value;
            const classVal = parseInt(document.getElementById('noteClass').value);
            const chapter = document.getElementById('noteChapter').value;
            const title = document.getElementById('noteTitle').value;
            const file = document.getElementById('noteFile').files[0];
            if (!subject || !classVal || !chapter || !title || !file) {
                alert('All fields required');
                return;
            }
            const storageRef = ref(storage, `notes/${Date.now()}_${file.name}`);
            await uploadBytes(storageRef, file);
            const url = await getDownloadURL(storageRef);
            await addDoc(collection(db, 'notes'), {
                subject, class: classVal, chapter, title, fileUrl: url, uploadedAt: new Date()
            });
            alert('Note uploaded');
            loadNotes();
        });

        async function loadNotes() {
            const snapshot = await getDocs(query(collection(db, 'notes'), orderBy('uploadedAt', 'desc')));
            const container = document.getElementById('notesList');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                container.innerHTML += `
                    <div class="list-item">
                        <div><strong>${d.title}</strong> (${d.subject} - Ch ${d.chapter})</div>
                        <div><a href="${d.fileUrl}" target="_blank">View</a></div>
                    </div>`;
            });
        }

        // ========== PRACTICE QUESTIONS ==========
        document.getElementById('saveQuestionBtn').addEventListener('click', async () => {
            const subject = document.getElementById('qSubject').value;
            const classVal = parseInt(document.getElementById('qClass').value);
            const chapter = document.getElementById('qChapter').value;
            const question = document.getElementById('qQuestion').value;
            const options = [
                document.getElementById('qOpt0').value,
                document.getElementById('qOpt1').value,
                document.getElementById('qOpt2').value,
                document.getElementById('qOpt3').value
            ];
            const correct = parseInt(document.getElementById('qCorrect').value);
            const file = document.getElementById('qImage').files[0];
            let imageUrl = '';
            if (file) {
                const imgRef = ref(storage, `question_images/${Date.now()}_${file.name}`);
                await uploadBytes(imgRef, file);
                imageUrl = await getDownloadURL(imgRef);
            }
            await addDoc(collection(db, 'practiceQuestions'), {
                subject, class: classVal, chapter, question, options, correctIndex: correct, imageUrl, createdAt: new Date()
            });
            alert('Practice question saved');
            loadQuestions();
        });

        async function loadQuestions() {
            const snapshot = await getDocs(query(collection(db, 'practiceQuestions'), orderBy('createdAt', 'desc')));
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                container.innerHTML += `<div class="list-item">${d.question} (${d.subject})</div>`;
            });
        }

        // ========== MCQs ==========
        document.getElementById('saveMcqBtn').addEventListener('click', async () => {
            const subject = document.getElementById('mcqSubject').value;
            const classVal = parseInt(document.getElementById('mcqClass').value);
            const chapter = document.getElementById('mcqChapter').value;
            const question = document.getElementById('mcqQuestion').value;
            const options = [
                document.getElementById('mcqOpt0').value,
                document.getElementById('mcqOpt1').value,
                document.getElementById('mcqOpt2').value,
                document.getElementById('mcqOpt3').value
            ];
            const correct = parseInt(document.getElementById('mcqCorrect').value);
            const file = document.getElementById('mcqImage').files[0];
            let imageUrl = '';
            if (file) {
                const imgRef = ref(storage, `mcq_images/${Date.now()}_${file.name}`);
                await uploadBytes(imgRef, file);
                imageUrl = await getDownloadURL(imgRef);
            }
            await addDoc(collection(db, 'mcqs'), {
                subject, class: classVal, chapter, question, options, correctIndex: correct, imageUrl, createdAt: new Date()
            });
            alert('MCQ saved');
            loadMcqs();
        });

        async function loadMcqs() {
            const snapshot = await getDocs(query(collection(db, 'mcqs'), orderBy('createdAt', 'desc')));
            const container = document.getElementById('mcqsList');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                container.innerHTML += `<div class="list-item">${d.question} (${d.subject})</div>`;
            });
        }

        // ========== STUDENTS ==========
        document.getElementById('addStudentBtn').addEventListener('click', async () => {
            const name = document.getElementById('studentName').value;
            const email = document.getElementById('studentEmail').value;
            const classVal = parseInt(document.getElementById('studentClass').value);
            const roll = document.getElementById('studentRoll').value;
            if (!name || !email || !classVal || !roll) return alert('All fields required');
            await addDoc(collection(db, 'students'), { name, email, class: classVal, rollNumber: roll, createdAt: new Date() });
            alert('Student added');
            loadStudents();
        });

        async function loadStudents() {
            const snapshot = await getDocs(query(collection(db, 'students'), orderBy('name')));
            const container = document.getElementById('studentsList');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                container.innerHTML += `<div class="list-item">${d.name} (Roll: ${d.rollNumber}) - Class ${d.class}</div>`;
            });
        }

        // ========== ATTENDANCE ==========
        let currentAttendanceStudents = [];
        document.getElementById('loadStudentsForAttendance').addEventListener('click', async () => {
            const attClass = parseInt(document.getElementById('attClass').value);
            if (!attClass) return alert('Enter class');
            const snapshot = await getDocs(query(collection(db, 'students'), where('class', '==', attClass)));
            currentAttendanceStudents = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
            renderAttendanceChecklist();
        });

        function renderAttendanceChecklist() {
            const container = document.getElementById('attendanceStudentsContainer');
            let html = '<div class="attendance-grid">';
            currentAttendanceStudents.forEach(s => {
                html += `<div class="student-check"><input type="checkbox" id="att_${s.id}" checked /> <label for="att_${s.id}">${s.name} (${s.rollNumber})</label></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            document.getElementById('saveAttendanceBtn').style.display = 'inline-block';
        }

        document.getElementById('saveAttendanceBtn').addEventListener('click', async () => {
            const date = document.getElementById('attDate').value;
            const subject = document.getElementById('attSubject').value;
            const classVal = parseInt(document.getElementById('attClass').value);
            if (!date || !subject || !classVal) return alert('Fill date, subject, class');
            const promises = currentAttendanceStudents.map(s => {
                const present = document.getElementById(`att_${s.id}`).checked;
                return addDoc(collection(db, 'attendance'), {
                    date, subject, class: classVal, studentId: s.id, present
                });
            });
            await Promise.all(promises);
            alert('Attendance saved');
            loadAttendanceRecords();
        });

        async function loadAttendanceRecords() {
            const snapshot = await getDocs(query(collection(db, 'attendance'), orderBy('date', 'desc')));
            const container = document.getElementById('attendanceRecords');
            container.innerHTML = '';
            snapshot.forEach(docSnap => {
                const d = docSnap.data();
                container.innerHTML += `<div class="list-item">${d.date} - ${d.subject} Class ${d.class}</div>`;
            });
        }

        // Load data for current tab
        function loadAllData() {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            if (activeTab === 'notes') loadNotes();
            if (activeTab === 'questions') loadQuestions();
            if (activeTab === 'mcqs') loadMcqs();
            if (activeTab === 'students') loadStudents();
            if (activeTab === 'attendance') loadAttendanceRecords();
        }
    </script>
</body>
</html>
